{% extends 'base.html' %} 
{% load static %} 
{% block content %}

<div class="page-header">
  <h1>Remove Weapon?</h1>
</div>
<h2>Are you sure you want to remove {{ object.name }}?</h2>

<form action="" method="post" class="form">
  {% csrf_token %}
  <a href="{% url 'weapon-detail' weapon.id %}" class="btn secondary"> Cancel </a>
  <button type="submit" class="btn danger">Yes - Remove!</button>
</form>

{% endblock %}
